apiVersion: kibana.k8s.elastic.co/v1
kind: Kibana
metadata:
  name: elastic
spec:
  version: 7.16.3
  count: 1
  elasticsearchRef:
    name: elastic
  http:
    tls: 
      selfSignedCertificate:
        disabled: false
  config:
    xpack.fleet.agents.elasticsearch.hosts:
    - https://elastic-es-http.elastic.svc:9200
    xpack.fleet.agents.fleet_server.hosts:
    - https://fleet-server-agent-http.elastic.svc:8220
    xpack.fleet.packages:
    - name: kubernetes
      # pinning this version as the next one introduced a kube-proxy host setting default that breaks this recipe,
      # see https://github.com/elastic/integrations/pull/1565 for more details
      version: 0.14.0
    xpack.fleet.agentPolicies:
    - name: Default Fleet Server on ECK policy
      is_default_fleet_server: true
      package_policies:
      - package:
          name: fleet_server
        name: fleet_server-1
    - name: Default Elastic Agent on ECK policy
      is_default: true
      unenroll_timeout: 900
      package_policies:
      - package:
          name: system
        name: system-1
      - package:
          name: kubernetes
        name: kubernetes-1
  podTemplate:
    spec:
      automountServiceAccountToken: true 
      securityContext:
          fsGroup: 1000
          runAsUser: 1000
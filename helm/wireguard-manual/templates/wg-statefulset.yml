apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: wg
  labels:
    app: wg
spec:
  serviceName: wg
  replicas: 1
  podManagementPolicy: "Parallel"
  selector:
    matchLabels:
      app: wg
  template:
    metadata:
      labels:
        app: wg
    spec:
      initContainers:
      - command: ["/bin/sh"]
        args:
          - -c
          - >-
              sysctl -w net.ipv4.conf.all.src_valid_mark=1 &&
              sysctl -w net.ipv4.ip_forward=1
        image: busybox
        imagePullPolicy: IfNotPresent
        name: init-sysctl
        securityContext:
          privileged: true
          runAsNonRoot: false
          runAsUser: 0
      securityContext:
        fsGroup: 1000
      containers:
        - name: wg
          image:  ghcr.io/linuxserver/wireguard
          imagePullPolicy: Always
          ports:
            - containerPort: 51820
          env:
          - name: PUID
            value: "1000"
          - name: PGID
            value: "1000"
          - name: TZ
            value: America/Toronto
          - name: SERVERURL
            value: vpn.loopset.net
          - name: SERVERPORT
            value: "51820"
          - name: PEERS
            value: "1"
          - name: PEERDNS
            value: auto
          - name: INTERNAL_SUBNET
            value: "10.13.13.0"
          - name: ALLOWEDIPS
            value: "0.0.0.0/0"
          securityContext:
            capabilities:
              add:
              - NET_ADMIN
              - SYS_MODULE
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
          volumeMounts:
          - name: config
            mountPath: /config 
  volumeClaimTemplates:
  - metadata:
      name: config
    spec:
      accessModes: 
        - ReadWriteOnce
      resources:
        requests:
          storage: 512Mi
